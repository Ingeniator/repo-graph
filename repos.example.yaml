repos:
  - name: baseimages
    github: Ingeniator/baseimages
    ref: main
    images:
      - name: ghcr.io/ingeniator/base-node:18
        dockerfile: ./Dockerfile

  - name: service-a
    github: Ingeniator/service-a
    ref: main

  - name: service-b
    path: ../example/service-b

settings:
  cacheDir: ./.cache/repos
  dockerfilePatterns:
    - Dockerfile
    - Dockerfile.*

imageOwnership:
  ghcr.io/ingeniator/base-node:18:
    repo: baseimages
    confidence: configured
